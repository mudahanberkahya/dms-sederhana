services:
  postgres:
    image: postgres:16-alpine
    container_name: dms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms_password
      POSTGRES_DB: dms
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dms-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - packages/server/.env
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/packages/server/storage

  nginx:
    image: nginx:alpine
    container_name: dms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
